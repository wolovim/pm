name: Test Meeting Form
description: A simple test form to verify GitHub issue forms work
title: "Test Meeting"
labels: ["test"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        This is a test form to verify GitHub issue forms work.

  - type: input
    id: meeting_title
    attributes:
      label: Meeting Title
      description: What is the meeting title?
      placeholder: "Test Meeting"
    validations:
      required: true

  - type: textarea
    id: agenda
    attributes:
      label: Agenda
      description: What is the agenda?
      placeholder: "Test agenda items"
    validations:
      required: true 